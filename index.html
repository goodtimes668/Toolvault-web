<script type="text/babel">
const { useState, useEffect } = React;

const API = “https://toolvault-slack-backend-production.up.railway.app/api”;
const CONDITIONS = [“Excellent”,“Good”,“Fair”,“Needs Repair”];
const COND_COLOR = { Excellent:”#10b981”, Good:”#3b82f6”, Fair:”#f59e0b”, “Needs Repair”:”#ef4444” };
const DEFAULT_CATEGORIES = [“Power Tools”,“Hand Tools”,“Heavy Equipment”,“Safety Gear”,“Surveying Equipment”,“Compaction Equipment”];
const SITE_TYPES = [“Residential”,“Commercial”,“Industrial”,“Institutional”];

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmt(d) { if(!d) return “—”; return new Date(d).toLocaleDateString(“en-US”,{month:“short”,day:“numeric”,year:“numeric”}); }
function isOverdue(date) { return date && new Date(date)<new Date(); }
function today() { return new Date().toISOString().split(“T”)[0]; }

// ─── LocalStorage for Job Sites ───────────────────────────────
function loadSites() { try { return JSON.parse(localStorage.getItem(“tv-jobsites”)||”[]”); } catch { return []; } }
function saveSites(s) { try { localStorage.setItem(“tv-jobsites”, JSON.stringify(s)); } catch {} }

async function apiFetch(path, options={}) {
const res = await fetch(`${API}${path}`, {
headers:{“Content-Type”:“application/json”},
…options,
body: options.body ? JSON.stringify(options.body) : undefined,
});
if(!res.ok) throw new Error(`HTTP ${res.status}`);
return res.json();
}

const api = {
getTools: () => apiFetch(”/tools”),
addTool: t => apiFetch(”/tools”,{method:“POST”,body:t}),
updateTool: (id,d) => apiFetch(`/tools/${id}`,{method:“PUT”,body:d}),
deleteTool: id => apiFetch(`/tools/${id}`,{method:“DELETE”}),
getRentals: () => apiFetch(”/rentals”),
addRental: r => apiFetch(”/rentals”,{method:“POST”,body:r}),
updateRental: (id,d) => apiFetch(`/rentals/${id}`,{method:“PUT”,body:d}),
getCategories: () => apiFetch(”/categories”),
updateCategories: c => apiFetch(”/categories”,{method:“PUT”,body:{categories:c}}),
getAlerts: () => apiFetch(”/alerts”),
markAlertsRead: () => apiFetch(”/alerts/read-all”,{method:“PUT”}),
getManager: () => apiFetch(”/manager”),
updateManager: n => apiFetch(”/manager”,{method:“PUT”,body:{name:n}}),
};

function App() {
const [view,setView] = useState(“dashboard”);
const [tools,setTools] = useState([]);
const [categories,setCategories] = useState(DEFAULT_CATEGORIES);
const [rentals,setRentals] = useState([]);
const [alerts,setAlerts] = useState([]);
const [managerName,setManagerName] = useState(“Site Manager”);
const [jobSites,setJobSites] = useState(loadSites());
const [loading,setLoading] = useState(true);
const [error,setError] = useState(null);
const [showAlerts,setShowAlerts] = useState(false);

const loadAll = async () => {
try {
setError(null);
const [t,c,r,a,m] = await Promise.all([api.getTools(),api.getCategories(),api.getRentals(),api.getAlerts(),api.getManager()]);
setTools(t); setCategories(c.length?c:DEFAULT_CATEGORIES); setRentals(r); setAlerts(a); setManagerName(m.name);
} catch(e) { setError(“Cannot connect to server. Check your Railway deployment.”); }
setLoading(false);
};

useEffect(()=>{loadAll();},[]);

const updateJobSites = (sites) => { setJobSites(sites); saveSites(sites); };

const activeRentals = rentals.filter(r=>r.status===“active”);
const overdueRentals = activeRentals.filter(r=>isOverdue(r.expectedReturn));
const damagedTools = tools.filter(t=>t.damageFlagged||t.condition===“Needs Repair”);
const availableTools = tools.filter(t=>!activeRentals.find(r=>r.toolId===t.id)&&t.condition!==“Needs Repair”);
const unread = alerts.filter(a=>!a.read).length;

const navItems = [
{id:“dashboard”,label:“Home”,emoji:“🏠”},
{id:“inventory”,label:“Inventory”,emoji:“📦”},
{id:“checkout”,label:“Out”,emoji:“📤”},
{id:“checkin”,label:“In”,emoji:“📥”},
{id:“more”,label:“More”,emoji:“⚙️”},
];

if(loading) return (
<div style={{background:”#0f0f0f”,display:“flex”,alignItems:“center”,justifyContent:“center”,height:“100vh”,flexDirection:“column”,gap:16}}>
<div style={{fontSize:32}}>🔧</div>
<div style={{color:”#f59e0b”,fontSize:13,letterSpacing:“0.15em”,fontFamily:”‘DM Mono’,monospace”}}>LOADING TOOLVAULT…</div>
</div>
);

if(error) return (
<div style={{background:”#0f0f0f”,display:“flex”,alignItems:“center”,justifyContent:“center”,height:“100vh”,padding:24}}>
<div style={{background:”#18181b”,borderRadius:20,padding:32,maxWidth:400,textAlign:“center”}}>

<div style={{color:”#fff”,fontSize:18,fontWeight:700,marginBottom:8}}>Connection Error</div>
<div style={{color:”#71717a”,fontSize:14,marginBottom:24,lineHeight:1.6}}>{error}</div>
<button onClick={loadAll} style={{background:”#f59e0b”,border:“none”,borderRadius:12,padding:“14px 24px”,fontWeight:700,fontSize:15,cursor:“pointer”,width:“100%”,fontFamily:”‘DM Sans’,sans-serif”}}>Try Again</button>
</div>
</div>
);

return (
<div style={{background:”#f4f4f5”,minHeight:“100vh”}}>
{/* Top Bar */}
<div style={{background:”#18181b”,position:“sticky”,top:0,zIndex:50,boxShadow:“0 2px 12px rgba(0,0,0,0.3)”}}>

</div>
</div>

<button onClick={()=>setShowAlerts(!showAlerts)} style={{position:“relative”,background:”#27272a”,border:“none”,borderRadius:10,width:40,height:40,cursor:“pointer”,fontSize:17}}>

</button>

</div>
</div>

{done&&<SuccessBanner msg="Tool successfully checked in!"/>}
<div style={{display:“flex”,flexDirection:“column”,gap:18}}>
<div><label className="tv-label">Select Rental *</label><select value={f.rentalId} onChange={e=>set(“rentalId”,e.target.value)} className=“tv-input”><option value="">— Select tool being returned —</option>{activeRentals.map(r=>{const t=tools.find(x=>x.id===r.toolId);const ov=isOverdue(r.expectedReturn);return<option key={r.id} value={r.id}>{t?.name||“Unknown”} — {r.checkedOutBy}{ov?” ⚠️ OVERDUE”:””}</option>;})}</select></div>
{selRental&&<div style={{background:”#eff6ff”,borderRadius:16,padding:“16px 18px”,border:“1.5px solid #bfdbfe”}}><div style={{fontSize:17,fontWeight:700,color:”#1e40af”,marginBottom:8}}>{selTool?.name}</div><div style={{fontSize:14,color:”#3b82f6”,lineHeight:1.7}}>By: <strong>{selRental.checkedOutBy}</strong>{selRental.company?` · ${selRental.company}`:””}<br/>📍 {selRental.jobSite} | Due: {fmt(selRental.expectedReturn)}{isOverdue(selRental.expectedReturn)&&<><br/><strong style={{color:”#d97706”}}>⚠️ Overdue</strong></>}</div></div>}
<div><label className="tv-label">Return Condition</label><select value={f.returnCondition} onChange={e=>set(“returnCondition”,e.target.value)} className=“tv-input”>{CONDITIONS.map(c=><option key={c}>{c}</option>)}</select></div>
<label style={{display:“flex”,alignItems:“center”,gap:14,cursor:“pointer”}}>
<input type=“checkbox” checked={f.damageFlagged} onChange={e=>set(“damageFlagged”,e.target.checked)} style={{width:22,height:22,accentColor:”#ef4444”}}/>
<span style={{fontSize:16,fontWeight:700,color:”#dc2626”}}>🚩 Flag as Damaged</span>
</label>
{f.damageFlagged&&<div><label className="tv-label">Damage Description *</label><textarea value={f.damageDesc} onChange={e=>set(“damageDesc”,e.target.value)} placeholder=“Describe the damage…” className=“tv-input” style={{borderColor:”#fca5a5”}}/></div>}
<div><label className="tv-label">Return Notes</label><textarea value={f.notes} onChange={e=>set(“notes”,e.target.value)} placeholder=“Condition notes, missing parts…” className=“tv-input”/></div>
<div><label className="tv-label">Return Signature</label><input value={f.signature} onChange={e=>set(“signature”,e.target.value)} placeholder=“Person returning types full name” className=“tv-input” style={{fontStyle:“italic”}}/></div>
<button onClick={submit} className=“tv-btn” style={{background:”#18181b”,color:”#fff”}} disabled={saving}>{saving?“Saving…”:“✓ Confirm Check In”}</button>
</div>
</div>
);
}

// ─── ACTIVE RENTALS ───────────────────────────────────────────
function ActiveRentals({tools,rentals,overdueRentals}) {
return(
<div>
<h1 style={{fontSize:26,fontWeight:800,color:”#18181b”,margin:“0 0 20px”}}>Active Rentals</h1>
{overdueRentals.length>0&&<div style={{background:”#fffbeb”,border:“2px solid #fcd34d”,borderRadius:18,padding:“16px 18px”,marginBottom:20}}><div style={{fontSize:15,fontWeight:700,color:”#92400e”}}>⚠️ {overdueRentals.length} overdue — follow up immediately</div></div>}
{rentals.length===0?<div style={{textAlign:“center”,padding:“60px 0”,color:”#a1a1aa”}}><div style={{fontSize:44,marginBottom:14}}>📋</div><p style={{fontSize:15,margin:0}}>No active rentals</p></div>
:rentals.map(r=>{
const tool=tools.find(t=>t.id===r.toolId)||{};
const ov=isOverdue(r.expectedReturn);
return(
<div key={r.id} className=“tv-card” style={{borderLeft:`4px solid ${ov?"#f59e0b":r.rentalType==="external"?"#8b5cf6":"#3b82f6"}`}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,marginBottom:14}}>
<div style={{flex:1,paddingRight:12}}>
<div style={{fontSize:18,fontWeight:700,color:”#18181b”}}>{tool.name||“Unknown Tool”}</div>
<div style={{fontSize:13,color:”#71717a”,marginTop:4}}>{r.checkedOutBy}{r.company?` · ${r.company}`:””}</div>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:6,alignItems:“flex-end”}}>
<span className=“tv-badge” style={{background:r.rentalType===“external”?”#ede9fe”:”#dbeafe”,color:r.rentalType===“external”?”#5b21b6”:”#1e40af”}}>{r.rentalType}</span>
{ov&&<span className=“tv-badge” style={{background:”#fef3c7”,color:”#92400e”}}>OVERDUE</span>}
</div>
</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:12}}>
<InfoBlock label=“Job Site” value={r.jobSite||”—”}/>
<InfoBlock label=“Due Date” value={fmt(r.expectedReturn)} color={ov?”#d97706”:undefined}/>
<InfoBlock label="Checked Out" value={fmt(r.checkoutDate)}/>
<InfoBlock label="Condition" value={r.checkoutCondition} color={COND_COLOR[r.checkoutCondition]}/>
</div>
</div>
);
})}
</div>
);
}

// ─── CATEGORIES ───────────────────────────────────────────────
function Categories({categories,onRefresh}) {
const [newCat,setNewCat]=useState(””);
const add=async()=>{const v=newCat.trim();if(!v||categories.includes(v))return;await api.updateCategories([…categories,v]);setNewCat(””);onRefresh();};
const del=async c=>{if(!confirm(`Delete "${c}"?`))return;await api.updateCategories(categories.filter(x=>x!==c));onRefresh();};
return(
<div>
<h1 style={{fontSize:26,fontWeight:800,color:”#18181b”,margin:“0 0 20px”}}>Categories</h1>
<div style={{display:“flex”,gap:10,marginBottom:20}}>
<input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key===“Enter”&&add()} placeholder=“New category name…” className=“tv-input” style={{flex:1}}/>
<button onClick={add} style={{background:”#f59e0b”,border:“none”,borderRadius:13,padding:“0 20px”,fontWeight:700,fontSize:15,cursor:“pointer”,fontFamily:”‘DM Sans’,sans-serif”,color:”#18181b”,whiteSpace:“nowrap”}}>Add</button>
</div>
<div style={{background:”#fff”,borderRadius:20,overflow:“hidden”,boxShadow:“0 1px 3px rgba(0,0,0,0.07)”}}>
{categories.map((cat,i)=>(
<div key={cat} style={{padding:“16px 18px”,borderBottom:i<categories.length-1?“1px solid #f4f4f5”:“none”,display:“flex”,alignItems:“center”,gap:12}}>
<div style={{width:8,height:8,background:”#f59e0b”,borderRadius:“50%”}}/>
<span style={{flex:1,fontSize:16,fontWeight:600,color:”#18181b”}}>{cat}</span>
<button onClick={()=>del(cat)} style={{background:“none”,border:“none”,padding:“8px”,cursor:“pointer”,fontSize:16}}>🗑️</button>
</div>
))}
</div>
</div>
);
}

// ─── SETTINGS ─────────────────────────────────────────────────
function SettingsPage({managerName,onRefresh}) {
const [name,setName]=useState(managerName);
const [saved,setSaved]=useState(false);
return(
<div>
<h1 style={{fontSize:26,fontWeight:800,color:”#18181b”,margin:“0 0 20px”}}>Settings</h1>
<div style={{display:“flex”,flexDirection:“column”,gap:20}}>
<div><label className="tv-label">Manager / Dispatcher Name</label><input value={name} onChange={e=>setName(e.target.value)} className=“tv-input”/></div>
<div style={{background:”#eff6ff”,borderRadius:18,padding:18,border:“1.5px solid #bfdbfe”}}>
<div style={{fontSize:15,fontWeight:700,color:”#1e40af”,marginBottom:10}}>🔔 Alert System</div>
<div style={{fontSize:14,color:”#3b82f6”,lineHeight:1.8}}>🟡 Overdue alerts post to #tools-alerts hourly<br/>🔴 Damage alerts post instantly on check-in</div>
</div>
{saved&&<SuccessBanner msg="Settings saved!"/>}
<button onClick={async()=>{await api.updateManager(name);await onRefresh();setSaved(true);setTimeout(()=>setSaved(false),2500);}} className=“tv-btn” style={{background:”#f59e0b”,color:”#18181b”}}>Save Settings</button>
</div>
</div>
);
}

// ─── SHARED ───────────────────────────────────────────────────
function InfoBlock({label,value,color}) {
return(
<div>
<div style={{fontSize:11,fontWeight:700,color:”#a1a1aa”,textTransform:“uppercase”,letterSpacing:“0.06em”,marginBottom:3}}>{label}</div>
<div style={{fontSize:14,fontWeight:600,color:color||”#3f3f46”,fontFamily:”‘DM Mono’,monospace”,wordBreak:“break-word”}}>{value}</div>
</div>
);
}

function SuccessBanner({msg}) {
return(
<div style={{background:”#f0fdf4”,border:“2px solid #86efac”,borderRadius:16,padding:“14px 16px”,marginBottom:16,display:“flex”,alignItems:“center”,gap:10}}>
<span style={{fontSize:18}}>✅</span>
<span style={{fontSize:15,fontWeight:600,color:”#166534”}}>{msg}</span>
</div>
);
}

ReactDOM.render(<App/>, document.getElementById(“root”));
</script>

</body>
</html>
